<body class="min-h-screen flex items-center justify-center p-md">
<!-- Modal Backdrop -->
<div class="fixed inset-0 bg-on-background/40 backdrop-blur-sm z-40"></div>
<!-- Main Modal Container -->
<div class="relative z-50 w-full max-w-[840px] bg-surface-container-lowest border border-outline-variant shadow-2xl flex flex-col overflow-hidden animate-in fade-in zoom-in duration-300">
<!-- Header -->
<header class="h-toolbar-height flex items-center justify-between px-md border-b border-outline-variant bg-surface-container-low">
<div class="flex items-center gap-sm">
<span class="material-symbols-outlined text-primary text-[20px]">account_tree</span>
<h1 class="font-title-lg text-title-lg text-on-surface">子表映射配置 - 订单明细</h1>

<button class="w-8 h-8 flex items-center justify-center hover:bg-surface-variant transition-colors rounded">
<span class="material-symbols-outlined text-on-surface-variant">close</span>
</button>
</header>
<!-- Scrollable Content -->
<main class="flex-1 overflow-y-auto custom-scrollbar p-lg space-y-xl max-h-[768px]">
<!-- Section 1: Data Association -->
<section class="space-y-md">
<div class="flex items-center gap-xs">
<div class="w-1 h-4 bg-secondary rounded-full"></div>
<h2 class="font-title-md text-title-md text-on-surface uppercase tracking-wider">数据关联配置</h2>
</div>
<div class="grid grid-cols-2 gap-md bg-surface-container-low/50 p-md border border-outline-variant rounded-lg">
<div class="space-y-xs">
<label class="font-label-md text-label-md text-on-surface-variant">关联表格编码</label>
<div class="relative">
<input class="w-full h-10 px-sm font-mono-label text-mono-label bg-surface border border-outline-variant focus:border-secondary focus:ring-0 cursor-default" readonly="" type="text" value="TB_ORDER_ITEMS_001"/>
<span class="material-symbols-outlined absolute right-2 top-2.5 text-on-surface-variant/50 text-sm">lock</span>
</div>
</div>
<div class="space-y-xs">
<label class="font-label-md text-label-md text-on-surface-variant">主键关联字段</label>
<select class="w-full h-10 px-sm font-body-md text-body-md bg-surface border border-outline-variant focus:border-secondary focus:ring-1 focus:ring-secondary transition-all">
<option>order_id</option>
<option>parent_guid</option>
<option>ref_document_id</option>
</select>
</div>
<div class="col-span-2 space-y-xs">
<label class="font-label-md text-label-md text-on-surface-variant">默认过滤条件 (SQL-Where)</label>
<div class="relative">
<textarea class="w-full px-sm py-sm font-mono-label text-mono-label bg-surface border border-outline-variant focus:border-secondary focus:ring-1 focus:ring-secondary transition-all resize-none" placeholder="例如: status = 'active' AND is_deleted = 0" rows="2"></textarea>
<button class="absolute right-2 bottom-2 p-1 hover:bg-surface-variant rounded">
<span class="material-symbols-outlined text-secondary text-lg">code</span>
</button>
</div>
</div>
</div>
</section>
<!-- Section 2: Display Rules -->
<section class="space-y-md">
<div class="flex items-center gap-xs">
<div class="w-1 h-4 bg-secondary rounded-full"></div>
<h2 class="font-title-md text-title-md text-on-surface uppercase tracking-wider">显示规则</h2>
</div>
<div class="grid grid-cols-2 gap-lg bg-surface-container-low/50 p-md border border-outline-variant rounded-lg">
<div class="space-y-sm">
<div class="flex items-center justify-between group cursor-pointer">
<label class="font-body-md text-body-md text-on-surface-variant group-hover:text-on-surface transition-colors">显示表头 (Show Header)</label>
<input checked="" class="w-4 h-4 text-secondary rounded border-outline-variant focus:ring-secondary" type="checkbox"/>
</div>
<div class="flex items-center justify-between group cursor-pointer">
<label class="font-body-md text-body-md text-on-surface-variant group-hover:text-on-surface transition-colors">允许增行 (Enable Add Row)</label>

</div>
<div class="flex items-center justify-between group cursor-pointer">
<label class="font-body-md text-body-md text-on-surface-variant group-hover:text-on-surface transition-colors">允许批量删除 (Enable Batch Delete)</label>
<input class="w-4 h-4 text-secondary rounded border-outline-variant focus:ring-secondary" type="checkbox"/>
</div>
</div>
<div class="space-y-sm">

<div class="flex gap-sm">
<button class="flex-1 h-9 font-body-md text-body-md bg-secondary text-on-secondary border border-secondary">自动适应 (Auto)</button>

<div class="relative">

<span class="absolute right-3 top-2 font-label-md text-label-md text-on-surface-variant">PX</span>
</div>
</div>
</div>
</section>
<!-- Section 3: Field Permissions -->

<tbody class="divide-y divide-outline-variant bg-surface">

<td class="px-md py-sm font-mono-label text-mono-label text-primary">sku_id</td>

<td class="px-md py-sm text-center"><input checked="" class="w-4 h-4 text-secondary rounded" type="checkbox"/></td>

<td class="px-md py-sm text-center"><input checked="" class="w-4 h-4 text-secondary rounded" type="checkbox"/></td>

<td class="px-md py-sm text-center"><input checked="" class="w-4 h-4 text-secondary rounded" type="checkbox"/></td>
<td class="px-md py-sm text-center"><input class="w-4 h-4 text-secondary rounded" type="checkbox"/></td>
<td class="px-md py-sm text-center"><input class="w-4 h-4 text-secondary rounded" type="checkbox"/></td>
</tr>
<tr class="bg-surface-container-lowest hover:bg-surface-container-low transition-colors">
<td class="px-md py-sm font-mono-label text-mono-label text-primary">remarks</td>
<td class="px-md py-sm font-body-md text-body-md text-on-surface-variant">备注说明</td>
<td class="px-md py-sm text-center"><input checked="" class="w-4 h-4 text-secondary rounded" type="checkbox"/></td>
<td class="px-md py-sm text-center"><input checked="" class="w-4 h-4 text-secondary rounded" type="checkbox"/></td>
<td class="px-md py-sm text-center"><input class="w-4 h-4 text-secondary rounded" type="checkbox"/></td>
</tr>
</tbody>
</table>
</div>
</section>
</main>
<!-- Footer Actions -->
<footer class="h-[72px] px-lg border-t border-outline-variant bg-surface-container-lowest flex items-center justify-end gap-md">
<button class="px-xl h-10 font-title-md text-title-md text-on-surface-variant bg-surface-container-lowest border border-outline-variant hover:bg-surface-variant transition-colors active:scale-95 duration-150">
                取消
            </button>
<button class="px-xl h-10 font-title-md text-title-md text-on-primary bg-primary border border-primary hover:bg-primary-container transition-colors shadow-sm active:scale-95 duration-150">
                确认保存
            </button>
</footer>
</div>
<!-- Decorative Industrial Element (Optional Background) -->
<div class="fixed top-0 left-0 w-full h-1 pointer-events-none bg-gradient-to-r from-secondary via-primary to-secondary/30 opacity-50 z-[60]"></div>
<script>
        // Simple micro-interaction for Height toggle
        const heightButtons = document.querySelectorAll('section:nth-child(2) button');
        const heightInput = document.querySelector('input[type="number"]');

        heightButtons.forEach(btn => {
            btn.addEventListener('click', () => {
                heightButtons.forEach(b => {
                    b.classList.remove('bg-secondary', 'text-on-secondary');
                    b.classList.add('bg-surface', 'text-on-surface-variant', 'border-outline-variant');
                });
                btn.classList.add('bg-secondary', 'text-on-secondary');
                btn.classList.remove('bg-surface', 'text-on-surface-variant', 'border-outline-variant');
                
                if (btn.innerText.includes('固定')) {
                    heightInput.removeAttribute('disabled');
                    heightInput.classList.remove('bg-surface-variant/30', 'opacity-50', 'cursor-not-allowed');
                    heightInput.classList.add('bg-surface');
                } else {
                    heightInput.setAttribute('disabled', 'true');
                    heightInput.classList.add('bg-surface-variant/30', 'opacity-50', 'cursor-not-allowed');
                    heightInput.classList.remove('bg-surface');
                }
            });
        });
    </script>
</body></html>
