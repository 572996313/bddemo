<body class="bg-background">
<!-- Sidebar -->

</a>

<!-- Main Content Canvas -->
<main class="ml-[320px] min-h-screen flex flex-col">
<!-- Top App Bar -->
<header class="h-toolbar-height bg-surface border-b border-outline-variant flex justify-between items-center px-lg w-full z-40 sticky top-0">
<div class="flex items-center gap-md">

</div>
<div class="flex items-center gap-md">
<button class="p-2 hover:bg-surface-container-high rounded-full transition-colors">

</button>

<div class="flex flex-col items-end">

<!-- Form Section -->
<div class="grid grid-cols-12 gap-md">
<!-- Basic Metadata Card -->
<div class="col-span-12 lg:col-span-7 bg-white border border-outline-variant rounded p-lg">
<h3 class="text-title-md font-title-md text-on-surface mb-md flex items-center gap-sm">

                    </h3>
<div class="grid grid-cols-2 gap-lg">
<div class="flex flex-col gap-xs">

<input class="border border-outline-variant rounded p-sm text-body-md focus-ring" id="table-name" placeholder="例如：Asset_Registry_V1" type="text"/>

<div class="flex flex-col gap-xs">

<input class="border border-outline-variant rounded p-sm text-body-md font-mono focus-ring" id="unique-code" placeholder="T_ASSET_MAIN" type="text"/>
</div>
<div class="col-span-2 flex flex-col gap-xs">
<label class="text-label-md font-label-md text-on-surface-variant" for="data-source">数据源</label>
<div class="relative">
<select class="w-full border border-outline-variant rounded p-sm text-body-md appearance-none focus-ring" id="data-source">

<option>实时 IoT 枢纽</option>

                        展示优化

</div>
</label>
</div>
<!-- Mode 3: Master-Detail -->

<label class="flex items-center gap-md p-md border border-outline-variant rounded cursor-pointer hover:bg-surface-container-low transition-all" for="layout-master-detail">

<div>

</label>
</div>

<div class="relative">

<div>
<p class="text-label-md font-label-md text-secondary font-bold uppercase tracking-wider">系统状态</p>

</div>
<div class="flex items-center gap-lg">
<div class="text-right">
<p class="text-label-md font-label-md text-on-surface-variant">活动同步</p>
<p class="text-title-md font-title-md text-primary">已连接</p>
</div>
<div class="w-12 h-12 bg-surface-container-highest rounded-full flex items-center justify-center border border-outline-variant">
<span class="material-symbols-outlined text-secondary animate-pulse" style="font-variation-settings: 'FILL' 1;">sync</span>
</div>
</div>
</div>
</div>
</div>
</div>
</div>
</main>
<script>
    // Micro-interactions for selection
    document.querySelectorAll('.radio-card').forEach(radio => {
        radio.addEventListener('change', (e) => {
            const labels = document.querySelectorAll('.radio-card + label');
            labels.forEach(l => {
                l.classList.remove('bg-surface-container-low', 'border-secondary', 'shadow-[0_0_0_1px_#165db2]');
            });
            if(e.target.checked) {
                e.target.nextElementSibling.classList.add('bg-surface-container-low', 'border-secondary', 'shadow-[0_0_0_1px_#165db2]');
            }
        });
    });

    // Basic form animation on load
    window.addEventListener('DOMContentLoaded', () => {
        const cards = document.querySelectorAll('.bg-white');
        cards.forEach((card, index) => {
            card.style.opacity = '0';
            card.style.transform = 'translateY(10px)';
            setTimeout(() => {
                card.style.transition = 'all 0.4s ease-out';
                card.style.opacity = '1';
                card.style.transform = 'translateY(0)';
            }, index * 100);
        });
    });
</script>
